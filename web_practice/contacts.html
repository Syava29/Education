<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма обратной связи</title>
</head>
<body>
    <form action="#" method="post">
        <label for="name-input">Имя *</label>
        <input type="text" id="name-input" name="name" placeholder="Имя" required>

        <label for="email-input">E-mail *</label>
        <input type="email" id="email-input" placeholder="example@example.ru" name="email" required>

        <label for="tel-input">Телефон</label>
        <input type="tel" id="tel-input" name="phone" placeholder="+78008008080">

        <label for="cat-questions">Категория вопроса</label>
        <select name="cat-questions" id="cat-questions">
            <option value="order">Вопрос по заказу</option>
            <option value="return">Возврат товара</option>
            <option value="cooperation">Сотрудничество</option>
            <option value="other">Другое</option>
        </select>

        <label for="message">Сообщение *</label>
        <textarea name="message" id="message" cols="30" rows="10" placeholder="Сообщение..." required></textarea>
        
        <label for="agree">Согласен на обработку персональных данных *</label>        
        <input type="checkbox" name="agree" id="agree" required>

        <button type="submit">Отправить</button>
    </form>    
</body>
</html>
